<script>
/* =========================================================
   Smooth re-render (preserve scroll + focus)
========================================================= */
let _renderTimer = null;
function scheduleRender(delay = 120) {
  const scrollY = window.scrollY;
  const active = document.activeElement;
  const activeId = active ? active.id : null;

  let cursorPos = null;
  if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA") &&
      typeof active.selectionStart === "number") {
    cursorPos = active.selectionStart;
  }

  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(() => {
    render();
    window.scrollTo(0, scrollY);

    if (activeId) {
      const el = document.getElementById(activeId);
      if (el) {
        el.focus();
        if (cursorPos !== null && typeof el.selectionStart === "number" && el.type !== "date") {
          el.setSelectionRange(cursorPos, cursorPos);
        }
      }
    }
  }, delay);
}

/* =========================================================
   Ross 308 table (g/bird/day)
========================================================= */
const ROSS_308_FEED_INTAKE = {
  1:19,2:15,3:19,4:24,5:28,6:33,7:37,8:42,9:47,10:51,
  11:56,12:60,13:65,14:69,15:74,16:78,17:83,18:88,19:92,20:97,
  21:101,22:106,23:110,24:115,25:119,26:124,27:129,28:133,29:138,30:142,
  31:147,32:151,33:156,34:160,35:165,36:170,37:174,38:179,39:183,40:188,
  41:192,42:197,43:201,44:206,45:211,46:215,47:220,48:223,49:225,50:227,
  51:229,52:230,53:231,54:233,55:233,56:234,57:234,58:234,59:234,60:234
};

/* =========================================================
   Date helpers (timezone-safe)
========================================================= */
function dateOnly(d){ const x = new Date(d); x.setHours(0,0,0,0); return x; }
function iso(d){
  if (!d) return "";
  const x = dateOnly(d);
  return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`;
}
function parseISO(s){
  if (!s) return null;
  const [y,m,d] = String(s).split("-").map(Number);
  if (!y||!m||!d) return null;
  return dateOnly(new Date(y, m-1, d));
}
function addDays(d,n){ const x = new Date(dateOnly(d)); x.setDate(x.getDate()+n); return dateOnly(x); }

const _WD = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const _MO = ["January","February","March","April","May","June","July","August","September","October","November","December"];
function fmtDateLong(d){
  if (!d) return "—";
  const x = dateOnly(d);
  return `${_WD[x.getDay()]}, ${String(x.getDate()).padStart(2,"0")} ${_MO[x.getMonth()]} ${x.getFullYear()}`;
}
function fmtDateDMY(d){
  if (!d) return "";
  const x = dateOnly(d);
  return `${String(x.getDate()).padStart(2,"0")}/${String(x.getMonth()+1).padStart(2,"0")}/${x.getFullYear()}`;
}
function parseExcelDateDMY(v){
  if (v == null || v === "") return null;
  if (v instanceof Date) return dateOnly(v);

  if (typeof v === "number" && Number.isFinite(v)) {
    const utc = new Date(Math.round((v - 25569) * 86400 * 1000));
    return dateOnly(new Date(utc.getUTCFullYear(), utc.getUTCMonth(), utc.getUTCDate()));
  }

  let s = String(v).trim();
  if (!s) return null;
  s = s.split(" ")[0].trim().replaceAll("-", "/").replaceAll(".", "/");

  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return dateOnly(new Date(Number(m[3]), Number(m[2])-1, Number(m[1])));

  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
  if (m) {
    const yy2 = Number(m[3]);
    const yy = (yy2 <= 79) ? (2000 + yy2) : (1900 + yy2);
    return dateOnly(new Date(yy, Number(m[2])-1, Number(m[1])));
  }
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return parseISO(s);
  return null;
}

/* =========================================================
   Default cleanout
========================================================= */
function effectiveCleanoutDate(shed){
  return shed.cleanoutDate ? dateOnly(shed.cleanoutDate) : addDays(shed.placementDate, 54);
}

/* =========================================================
   Core business logic
========================================================= */
function ageInDays(placementDate, onDate){
  return Math.max(0, Math.floor((dateOnly(onDate) - dateOnly(placementDate)) / 86400000));
}
function rossFeedPerBirdKg(ageDays){
  if (ageDays <= 0) return 0;
  const age = Math.min(60, Math.max(1, Math.floor(ageDays)));
  return (ROSS_308_FEED_INTAKE[age] || 234) / 1000;
}
function feedPerBirdKg(shed, ageDays){
  if (shed.customFeedKg != null && shed.customFeedKg > 0) return shed.customFeedKg;
  return rossFeedPerBirdKg(ageDays);
}
function mortalityAppliedOnDate(shed, onDate){
  const today = dateOnly(new Date());
  const d = dateOnly(onDate);
  if (d < today) return 0;
  return Number(shed.mortality || 0);
}
function totalPickupsUpToDate(shed, onDate){
  const d = dateOnly(onDate);
  return (shed.pickups||[]).reduce((t,p)=> t + (dateOnly(p.date) <= d ? (Number(p.birds)||0) : 0), 0);
}
function populationOnDate(shed, onDate){
  const d = dateOnly(onDate);
  const cleanout = effectiveCleanoutDate(shed);
  if (cleanout && d > dateOnly(cleanout)) return 0;

  let pop = shed.initialPopulation;
  pop -= totalPickupsUpToDate(shed, d);
  pop -= mortalityAppliedOnDate(shed, d);
  return pop;
}
function dailyFeedKg(shed, onDate){
  const d = dateOnly(onDate);
  const cleanout = effectiveCleanoutDate(shed);
  if (cleanout && d > dateOnly(cleanout)) return 0;

  const age = ageInDays(shed.placementDate, d);
  const pop = Math.max(0, populationOnDate(shed, d));
  return pop * feedPerBirdKg(shed, age);
}
function feedNeededUntilCleanout(shed, referenceDate = new Date()){
  const end = effectiveCleanoutDate(shed);
  if (!end) return null;

  const start = dateOnly(referenceDate);
  const e = dateOnly(end);
  if (e < start) return 0;

  let total = 0;
  for (let d = new Date(start); d <= e; d.setDate(d.getDate() + 1)){
    total += dailyFeedKg(shed, d);
  }
  return total;
}
function groupDailyFeedKg(groupIndex, onDate){
  const i = (groupIndex - 1) * 2;
  return dailyFeedKg(sheds[i], onDate) + dailyFeedKg(sheds[i+1], onDate);
}

/* =========================================================
   State + Local persistence
========================================================= */
const STORAGE_KEY = "kiripark_farm_manager_v14_dash_silo_deliveries_latest";
let batchNumber = "";
let activeTab = "all";

const groupSilos = { 1:["","",""], 2:["","",""], 3:["","",""], 4:["","",""] };
const groupSilosInUseCount = { 1:3, 2:3, 3:3, 4:3 };
// Future deliveries per group
const groupDeliveries = { 1:[], 2:[], 3:[], 4:[] };

function saveState(){
  try{
    const payload = {
      batchNumber, activeTab, groupSilos, groupSilosInUseCount,
      groupDeliveries: {
        1: groupDeliveries[1].map(d => ({ date: iso(d.date), amountT: d.amountT, targetSilo: d.targetSilo, overflowSilo: d.overflowSilo })),
        2: groupDeliveries[2].map(d => ({ date: iso(d.date), amountT: d.amountT, targetSilo: d.targetSilo, overflowSilo: d.overflowSilo })),
        3: groupDeliveries[3].map(d => ({ date: iso(d.date), amountT: d.amountT, targetSilo: d.targetSilo, overflowSilo: d.overflowSilo })),
        4: groupDeliveries[4].map(d => ({ date: iso(d.date), amountT: d.amountT, targetSilo: d.targetSilo, overflowSilo: d.overflowSilo }))
      },
      sheds: sheds.map(s => ({
        id: s.id,
        placementDate: iso(s.placementDate),
        initialPopulation: s.initialPopulation,
        cleanoutDate: s.cleanoutDate ? iso(s.cleanoutDate) : null,
        customFeedKg: s.customFeedKg ?? null,
        mortality: Number(s.mortality || 0),
        prevMortalityBeforeFinal: (s.prevMortalityBeforeFinal != null && Number.isFinite(Number(s.prevMortalityBeforeFinal)))
          ? Number(s.prevMortalityBeforeFinal) : null,
        prevCleanoutBeforeFinal: s.prevCleanoutBeforeFinal ? iso(s.prevCleanoutBeforeFinal) : null,
        pickups: (s.pickups||[]).slice(0,5).map(p => ({
          date: iso(p.date), birds: p.birds, isFinal: !!p.isFinal,
          variance: (p.variance != null && Number.isFinite(Number(p.variance))) ? Number(p.variance) : null
        }))
      }))
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  }catch{}
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);

    if (typeof data.batchNumber === "string") batchNumber = data.batchNumber;
    if (typeof data.activeTab === "string") activeTab = data.activeTab;

    if (data.groupSilos) for (const g of [1,2,3,4]) if (Array.isArray(data.groupSilos[g])) groupSilos[g] = data.groupSilos[g].slice(0,3);
    if (data.groupSilosInUseCount) for (const g of [1,2,3,4]) {
      const n = Number(data.groupSilosInUseCount[g]);
      if (n>=1 && n<=3) groupSilosInUseCount[g] = n;
    }

    // Load deliveries
    if (data.groupDeliveries) {
      for (const g of [1,2,3,4]) {
        const arr = data.groupDeliveries[g];
        if (Array.isArray(arr)) {
          groupDeliveries[g] = arr.map(d => ({
            date: parseISO(d.date),
            amountT: Number(d.amountT) || 0,
            targetSilo: Number(d.targetSilo) || 1,
            overflowSilo: d.overflowSilo != null ? Number(d.overflowSilo) : null
          })).filter(d => d.date && d.amountT > 0);
        }
      }
    }

    if (Array.isArray(data.sheds) && data.sheds.length === 8){
      for (let i=0;i<8;i++){
        const s = data.sheds[i];
        sheds[i].placementDate = parseISO(s.placementDate) || sheds[i].placementDate;
        sheds[i].initialPopulation = Number(s.initialPopulation) || sheds[i].initialPopulation;
        sheds[i].cleanoutDate = s.cleanoutDate ? parseISO(s.cleanoutDate) : null;
        sheds[i].customFeedKg = (s.customFeedKg != null && Number(s.customFeedKg) > 0) ? Number(s.customFeedKg) : null;
        sheds[i].mortality = Number(s.mortality || 0);

        sheds[i].prevMortalityBeforeFinal =
          (s.prevMortalityBeforeFinal != null && Number.isFinite(Number(s.prevMortalityBeforeFinal)))
            ? Number(s.prevMortalityBeforeFinal) : null;
        sheds[i].prevCleanoutBeforeFinal = s.prevCleanoutBeforeFinal ? parseISO(s.prevCleanoutBeforeFinal) : null;

        sheds[i].pickups = Array.isArray(s.pickups)
          ? s.pickups.map(p => ({
              date: parseISO(p.date),
              birds: Number(p.birds) || 0,
              isFinal: !!p.isFinal,
              variance: (p.variance != null && Number.isFinite(Number(p.variance))) ? Number(p.variance) : null
            })).filter(p => p.date && p.birds > 0).slice(0,5)
          : [];

        // ensure only one final pickup
        let finalFound = false;
        sheds[i].pickups.forEach(p => {
          if (p.isFinal && !finalFound) finalFound = true;
          else if (p.isFinal && finalFound) p.isFinal = false;
        });

        sheds[i].pickups.sort((a,b)=>dateOnly(a.date)-dateOnly(b.date));
      }
    }
    return true;
  }catch{ return false; }
}

function resetLocalData(){
  if (!confirm("Clear locally saved state? (Excel files are not affected)")) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}
function setBatchNumber(v){
  batchNumber = String(v ?? "").trim();
  saveState();
  scheduleRender(50);
}
function setTab(tab){
  activeTab = tab;
  saveState();
  render();
}

/* =========================================================
   Initial farm data
========================================================= */
const sheds = [];
(function init(){
  const today = dateOnly(new Date());
  for (let i = 1; i <= 8; i++){
    sheds.push({
      id: i,
      placementDate: addDays(today, -10),
      initialPopulation: 20000 + i * 500,
      cleanoutDate: null,
      customFeedKg: null,
      mortality: 0,
      prevMortalityBeforeFinal: null,
      prevCleanoutBeforeFinal: null,
      pickups: []
    });
  }
  loadState();
})();

/* =========================================================
   FINAL PICKUP LOGIC (reversible)
========================================================= */
function pickupsTotalBeforeDate(shed, d){
  const target = dateOnly(d);
  return (shed.pickups || [])
    .filter(p => dateOnly(p.date) < target)
    .reduce((s,p)=>s + (Number(p.birds)||0), 0);
}
function getFinalPickup(shed){ return (shed.pickups || []).find(p => p.isFinal); }

function addPickup(shedId){
  const idx = shedId - 1;
  const shed = sheds[idx];

  if ((shed.pickups || []).length >= 5) return alert(`Shed ${shedId} already has 5 pickups (maximum).`);

  const dStr = document.getElementById(`pd_${shedId}`).value;
  const bStr = document.getElementById(`pb_${shedId}`).value;
  const finalChecked = !!document.getElementById(`pf_${shedId}`)?.checked;

  if (!dStr) return alert("Please choose a pickup date.");
  const birds = Number(bStr);
  if (!Number.isFinite(birds) || birds <= 0) return alert("Enter birds removed (> 0).");

  const d = parseISO(dStr);
  if (!d) return alert("Invalid date.");

  const existingFinal = getFinalPickup(shed);
  if (existingFinal && dateOnly(d) > dateOnly(existingFinal.date)){
    return alert(`This shed already has a FINAL pickup on ${fmtDateLong(existingFinal.date)}.\nRemove/unmark it before adding a later pickup.`);
  }

  const exists = shed.pickups.some(p => iso(p.date) === iso(d));
  if (exists) return alert("Pickup already exists on that date for this shed.");

  const I = Number(shed.initialPopulation || 0);
  const M = Number(shed.mortality || 0);
  const Pprev = pickupsTotalBeforeDate(shed, d);
  const LiveExpected = I - Pprev - M;
  const Variance = birds - LiveExpected;

  const pickupObj = { date:d, birds:Math.floor(birds), isFinal:!!finalChecked, variance:Number.isFinite(Variance)?Variance:null };

  if (pickupObj.isFinal){
    (shed.pickups || []).forEach(p => p.isFinal = false);

    shed.prevMortalityBeforeFinal = Number.isFinite(Number(shed.mortality)) ? Number(shed.mortality) : 0;
    shed.prevCleanoutBeforeFinal = shed.cleanoutDate ? dateOnly(shed.cleanoutDate) : null;

    const NewMortality = I - (Pprev + pickupObj.birds);
    shed.mortality = Math.floor(NewMortality);
    shed.cleanoutDate = dateOnly(d);
  }

  shed.pickups.push(pickupObj);
  shed.pickups.sort((a,b)=>dateOnly(a.date)-dateOnly(b.date));

  function computeVarianceForPickup(shed, pickupDate, pickupBirds, allPickups) {
  // Calculate total birds picked up before this pickup
  const prevTotal = allPickups
    .filter(p => dateOnly(p.date) < dateOnly(pickupDate))
    .reduce((sum, p) => sum + p.birds, 0);
  const expectedLive = shed.initialPopulation - prevTotal - shed.mortality;
  return pickupBirds - expectedLive;
}

  document.getElementById(`pd_${shedId}`).value = "";
  document.getElementById(`pb_${shedId}`).value = "";
  const f = document.getElementById(`pf_${shedId}`); if (f) f.checked = false;

  saveState();
  render();
}

function removePickup(shedId, dateIso){
  const idx = shedId - 1;
  const shed = sheds[idx];
  const before = shed.pickups || [];
  const removed = before.find(p => iso(p.date) === dateIso);

  shed.pickups = before.filter(p => iso(p.date) !== dateIso);

  if (removed?.isFinal){
    if (shed.prevMortalityBeforeFinal != null && Number.isFinite(Number(shed.prevMortalityBeforeFinal))){
      shed.mortality = Math.floor(Number(shed.prevMortalityBeforeFinal));
    }
    shed.cleanoutDate = shed.prevCleanoutBeforeFinal ? dateOnly(shed.prevCleanoutBeforeFinal) : null;
    shed.prevMortalityBeforeFinal = null;
    shed.prevCleanoutBeforeFinal = null;
  }

  saveState();
  render();
}

/* =========================================================
   Silos logic
========================================================= */
function siloTonsFromInput(input){
  const v = String(input ?? "").trim();
  if (v === "") return 0;
  const rings = Number(v);
  if (!Number.isFinite(rings)) return 0;
  const r = Math.max(0, Math.min(5, Math.floor(rings)));
  return 10 + (8 * r);
}
const SILO_MAX_T = 50; // 5 rings = 50t

/* Table end date: LATEST cleanout date (not earliest) */
function groupSiloTableEndDate(groupIndex){
  const today = dateOnly(new Date());
  const defaultEnd = addDays(today, 19);

  const i = (groupIndex - 1) * 2;
  const cA = effectiveCleanoutDate(sheds[i]);
  const cB = effectiveCleanoutDate(sheds[i+1]);

  const candidates = [cA, cB].filter(Boolean).map(dateOnly);
  if (!candidates.length) return defaultEnd;

  // Use the LATEST cleanout date (maximum)
  const latest = candidates.sort((a,b)=>b-a)[0];
  return latest;
}

function groupFeedNeededUntilCleanout(groupIndex){
  const i = (groupIndex - 1) * 2;
  const today = dateOnly(new Date());
  const a = feedNeededUntilCleanout(sheds[i], today);
  const b = feedNeededUntilCleanout(sheds[i+1], today);
  if (a == null || b == null) return null;
  return a + b;
}

/* =========================================================
   Forecast / depletion table (with deliveries)
   ✅ returns: orderDate, runoutDate, per-silo empty dates, days to empty
   ✅ stable consumption order: Silo 1 -> 2 -> 3 (re-evaluated each day)
========================================================= */
function fadeRowClassByRemaining(remT, startT){
  if (startT <= 0) return "bg-white";
  const p = remT / startT;
  if (remT <= 0) return "bg-rose-50";
  if (p <= 0.25) return "bg-orange-50";
  if (p <= 0.5) return "bg-yellow-50";
  return "bg-emerald-50";
}
function cellClassForSiloRemaining(t){
  if (t <= 0) return "bg-rose-100 text-rose-800";
  if (t <= 12.5) return "bg-orange-100 text-orange-800";
  if (t <= 25) return "bg-yellow-100 text-yellow-800";
  return "bg-emerald-100 text-emerald-800";
}

function forecastGroupSiloDepletionTable(groupIndex, siloTonsAll, activeCount, orderThresholdT, endDate, deliveries = []){
  const today = dateOnly(new Date());
  const end = dateOnly(endDate);
  const MAX_DAYS = 600;

  const active = siloTonsAll.slice(0, activeCount).map(x => Math.max(0, Number(x||0)));
  const siloKg = active.map(t => Math.round(t * 1000)); // mutable
  const totalStartKg = siloKg.reduce((a,b)=>a+b,0);
  const totalStartT = totalStartKg / 1000;

  let orderDate = null;
  let runoutDate = null;
  let totalKg = totalStartKg;

  const emptyDateBySilo = { 1:null, 2:null, 3:null };

  let rows = "";

  for (let dayOffset = 0; dayOffset < MAX_DAYS; dayOffset++){
    const day = addDays(today, dayOffset);
    const dayOfWeek = day.getDay();      // 0 = Sunday, 6 = Saturday
    const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
    let weekendClass = isWeekend ? ' weekend-row' : '';
    if (day > end) break;

    // ---- APPLY DELIVERIES ON THIS DAY ----
    const dayDeliveries = deliveries.filter(d => iso(d.date) === iso(day));
    let deliveryInfo = '';
    let hasDelivery = false;
    if (dayDeliveries.length) {
      hasDelivery = true;
      const parts = dayDeliveries.map(d => {
        let txt = `${d.amountT.toFixed(1)}t → S${d.targetSilo}`;
        if (d.overflowSilo) txt += ` (overflow S${d.overflowSilo})`;
        return txt;
      });
      deliveryInfo = parts.join('<br>');
    }
    for (const del of dayDeliveries) {
      let amountKg = Math.round(del.amountT * 1000);
      const targetIdx = del.targetSilo - 1;
      const overflowIdx = (del.overflowSilo != null && del.overflowSilo >= 1 && del.overflowSilo <= activeCount) ? del.overflowSilo - 1 : null;

      // Add to primary silo up to max
      if (targetIdx < activeCount) {
        const space = Math.max(0, SILO_MAX_T * 1000 - siloKg[targetIdx]);
        const addPrimary = Math.min(amountKg, space);
        siloKg[targetIdx] += addPrimary;
        amountKg -= addPrimary;
        totalKg += addPrimary;
      }

      // Overflow to secondary if any left
      if (amountKg > 0 && overflowIdx !== null && overflowIdx < activeCount) {
        const space = Math.max(0, SILO_MAX_T * 1000 - siloKg[overflowIdx]);
        const addOverflow = Math.min(amountKg, space);
        siloKg[overflowIdx] += addOverflow;
        amountKg -= addOverflow;
        totalKg += addOverflow;
      }

      // Any remaining amount is lost (exceeds capacity)
    }

    const useKg = Math.max(0, groupDailyFeedKg(groupIndex, day));
    const beforeKg = totalKg;

    let needKg = useKg;
    const usedSilosToday = new Set();
    const emptiedToday = [];

    // Consume in order Silo 1 → 2 → 3
    for (let idx = 0; idx < activeCount && needKg > 0; idx++) {
      if (siloKg[idx] <= 0) continue;
      usedSilosToday.add(idx + 1);
      const take = Math.min(siloKg[idx], needKg);
      siloKg[idx] -= take;
      totalKg -= take;
      needKg -= take;

      if (siloKg[idx] <= 0 && beforeKg > 0) {
        const sid = idx + 1;
        emptiedToday.push(sid);
        if (!emptyDateBySilo[sid]) emptyDateBySilo[sid] = dateOnly(day);
      }
    }

    const remainingT = Math.max(0, totalKg / 1000);
    const beforeT = Math.max(0, beforeKg / 1000);

    if (!orderDate && totalStartKg > 0 && remainingT <= orderThresholdT && remainingT > 0) orderDate = day;
    if (!runoutDate && totalStartKg > 0 && totalKg <= 0) runoutDate = day;

    let badges = "";
    if (orderDate && iso(day) === iso(orderDate)) badges += `<span class="ml-2 text-[11px] font-semibold text-amber-800">🟡 ORDER (≤ ${orderThresholdT}T)</span>`;
    if (emptiedToday.length) badges += `<span class="ml-2 text-[11px] font-semibold text-rose-700">🔴 Empty: ${emptiedToday.join(", ")}</span>`;
    if (runoutDate && iso(day) === iso(runoutDate)) badges += `<span class="ml-2 text-[11px] font-semibold text-rose-800">⛔ TOTAL EMPTY</span>`;

    const rowFade = fadeRowClassByRemaining(remainingT, totalStartT);
    const usedLabel = usedSilosToday.size ? `Silo ${Array.from(usedSilosToday).join(", ")}` : "-";
    const deliveryRowClass = hasDelivery ? ' delivery-row' : '';

    const s1 = (siloKg[0] ?? 0) / 1000;
    const s2 = (siloKg[1] ?? 0) / 1000;
    const s3 = (siloKg[2] ?? 0) / 1000;

    rows += `
      <tr class="border-t ${rowFade}${weekendClass}${deliveryRowClass}">
        <td class="py-2 px-3 whitespace-nowrap">${fmtDateLong(day)}${badges}</td>
        <td class="py-2 px-3 font-medium">${useKg.toFixed(0)}</td>
        <td class="py-2 px-3">${beforeT.toFixed(2)}</td>
        <td class="py-2 px-3 font-semibold">${remainingT.toFixed(2)}</td>
        <td class="py-2 px-3">${usedLabel}</td>
        <td class="py-2 px-3 align-top">
        ${hasDelivery ? `<div class="delivery-badge">➕ ${deliveryInfo}</div>` : '—'}
        </td>
        <td class="py-2 px-3"><span class="px-2 py-1 rounded-lg text-[11px] font-semibold ${cellClassForSiloRemaining(s1)}">${s1.toFixed(2)}T</span></td>
        <td class="py-2 px-3"><span class="px-2 py-1 rounded-lg text-[11px] font-semibold ${cellClassForSiloRemaining(s2)}">${s2.toFixed(2)}T</span></td>
        <td class="py-2 px-3"><span class="px-2 py-1 rounded-lg text-[11px] font-semibold ${cellClassForSiloRemaining(s3)}">${s3.toFixed(2)}T</span></td>
      </tr>
    `;

    if (totalKg <= 0) break;
    if (useKg <= 0 && dayOffset > 35) break;
  }

  const daysToEmptyBySilo = {
    1: emptyDateBySilo[1] ? Math.max(0, Math.ceil((emptyDateBySilo[1] - today)/86400000)) : null,
    2: emptyDateBySilo[2] ? Math.max(0, Math.ceil((emptyDateBySilo[2] - today)/86400000)) : null,
    3: emptyDateBySilo[3] ? Math.max(0, Math.ceil((emptyDateBySilo[3] - today)/86400000)) : null,
  };

  const daysRemainingTotal = runoutDate ? Math.max(0, Math.ceil((runoutDate - today)/86400000)) : null;

  return {
    totalStartT,
    orderDate,
    runoutDate,
    daysRemainingTotal,
    emptyDateBySilo,
    daysToEmptyBySilo,
    rows,
    tableEnd: end
  };
}

/* =========================================================
   Summary helpers
========================================================= */
function shedTotalPickedUp(shed){
  return (shed.pickups || []).reduce((s,p)=>s + (Number(p.birds)||0), 0);
}
function shedMortalityRate(shed){
  const init = Number(shed.initialPopulation||0);
  const mort = Number(shed.mortality || 0);
  if (init <= 0) return 0;
  return (mort / init) * 100;
}
function groupSummary(groupIndex){
  const today = dateOnly(new Date());
  const i = (groupIndex - 1) * 2;
  const a = sheds[i], b = sheds[i+1];

  const init = (a.initialPopulation||0) + (b.initialPopulation||0);
  const mort = Number(a.mortality||0) + Number(b.mortality||0);
  const picked = shedTotalPickedUp(a) + shedTotalPickedUp(b);
  const live = populationOnDate(a, today) + populationOnDate(b, today);
  const mortRate = (init > 0) ? (mort / init) * 100 : 0;

  return { init, mort, picked, live, mortRate };
}
function farmSummary(){
  const today = dateOnly(new Date());
  const init = sheds.reduce((s,x)=>s + (Number(x.initialPopulation)||0), 0);
  const mort = sheds.reduce((s,x)=>s + Number(x.mortality||0), 0);
  const picked = sheds.reduce((s,x)=>s + shedTotalPickedUp(x), 0);
  const live = sheds.reduce((s,x)=>s + populationOnDate(x, today), 0);

  const mortRate = (init > 0) ? (mort / init) * 100 : 0;
  const pickedRate = (init > 0) ? (picked / init) * 100 : 0;

  return { init, mort, picked, live, mortRate, pickedRate };
}

/* =========================================================
   ✅ Silo Insights computation for Dashboard + Group Panel
   (Net balance now includes future deliveries)
========================================================= */
function computeGroupSiloInsights(groupIndex){
  const inputs = groupSilos[groupIndex];
  const activeCount = groupSilosInUseCount[groupIndex] ?? 3;

  const t1 = siloTonsFromInput(inputs[0]);
  const t2 = siloTonsFromInput(inputs[1]);
  const t3 = siloTonsFromInput(inputs[2]);

  const activeTotalT = [t1,t2,t3].slice(0, activeCount).reduce((a,b)=>a+b,0);

  const end = groupSiloTableEndDate(groupIndex);
  const deliveries = groupDeliveries[groupIndex] || [];
  const sim = forecastGroupSiloDepletionTable(groupIndex, [t1,t2,t3], activeCount, 70, end, deliveries);

  const cleanoutKg = groupFeedNeededUntilCleanout(groupIndex);
  const neededT = (cleanoutKg == null) ? null : (cleanoutKg / 1000);
  
  // Sum all future deliveries for this group
  const totalDeliveryT = deliveries.reduce((sum, d) => sum + d.amountT, 0);
  
  const netT = (neededT == null) ? null : (activeTotalT + totalDeliveryT - neededT);

  const daysToEmpty = sim.daysToEmptyBySilo || {1:null,2:null,3:null};

  return {
    activeCount,
    t1,t2,t3,
    activeTotalT,
    totalDeliveryT,
    orderDate: sim.orderDate || null,
    runoutDate: sim.runoutDate || null,
    daysRemainingTotal: sim.daysRemainingTotal ?? null,
    neededT,
    cleanoutKg,
    netT,
    daysToEmpty,
    tableEnd: sim.tableEnd,
    tableRowsHtml: sim.rows || ""
  };
}

function fmtDays(n){
  if (n == null) return "—";
  if (!Number.isFinite(n)) return "—";
  return `${n} day${n===1?"":"s"}`;
}

/* =========================================================
   ✅ Dashboard Silo Insights Card (NO chart)
========================================================= */
function dashboardSiloInsightsCard(groupIndex){
  const s = computeGroupSiloInsights(groupIndex);

  const netTone = (s.netT == null) ? "slate" : (s.netT >= 0 ? "green" : "red");

  const silo1Txt = s.daysToEmpty[1] == null ? "—" : `${fmtDays(s.daysToEmpty[1])}`;
  const silo2Txt = s.daysToEmpty[2] == null ? "—" : `${fmtDays(s.daysToEmpty[2])}`;
  const silo3Txt = s.daysToEmpty[3] == null ? "—" : `${fmtDays(s.daysToEmpty[3])}`;

  const activeBadge = pill(`Silos in use: ${s.activeCount}`, "violet");

  return `

      <div class="flex items-start justify-between gap-2">
        <div>
          <div class="text-sm font-bold leading-4">🛢️ Silo Insights</div>
          <div class="text-[12px] text-slate-500 mt-0.5">Dashboard</div>
        </div>
        ${activeBadge}
      </div>

      <div class="mt-2 space-y-1.5">
        ${statLine("Suggested order date", s.orderDate ? `<span class="text-amber-700 font-bold">${fmtDateLong(s.orderDate)}</span>` : `<span class="text-slate-600">—</span>`)}

        ${statLine("Net balance", (s.netT==null) ? "—" : `
          <span>
            <span class="${s.netT>=0?'text-emerald-700':'text-rose-700'} font-bold">${s.netT.toFixed(2)} t</span>

          </span>
        `)}
      </div>

      <div class="mt-3 pt-3 border-t border-slate-100">
        <div class="text-xs font-semibold text-slate-700 mb-2">Days until empty (per silo)</div>
        <div class="grid grid-cols-3 gap-2">
          <div class="rounded-xl border border-slate-200 p-2">
            <div class="text-xs text-slate-500">Silo 1</div>
            <div class="text-sm font-bold">${silo1Txt}</div>
          </div>
          <div class="rounded-xl border border-slate-200 p-2">
            <div class="text-xs text-slate-500">Silo 2</div>
            <div class="text-sm font-bold">${silo2Txt}</div>
          </div>
          <div class="rounded-xl border border-slate-200 p-2">
            <div class="text-xs text-slate-500">Silo 3</div>
            <div class="text-sm font-bold">${silo3Txt}</div>
          </div>
        </div>
      </div>

      <div class="mt-3 pt-3 border-t border-slate-100 space-y-1.5">
        ${statLine("Current tonnes (S1/S2/S3)", `${s.t1.toFixed(2)} / ${s.t2.toFixed(2)} / ${s.t3.toFixed(2)} t`)}
        ${statLine("Active total", `${s.activeTotalT.toFixed(2)} t`)}

async function fetchWeather() {
  const lat = -31.4255;
  const lon = 115.8899;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if (data.current_weather && data.daily) {
      const currentTemp = data.current_weather.temperature;
      const weatherCode = data.current_weather.weathercode;

      const todayMin = data.daily.temperature_2m_min[0];
      const todayMax = data.daily.temperature_2m_max[0];

      let desc = "";
      let icon = "🌤️";
      if (weatherCode === 0) { desc = "Clear"; icon = "☀️"; }
      else if (weatherCode <= 3) { desc = "Partly cloudy"; icon = "⛅"; }
      else if (weatherCode <= 48) { desc = "Fog"; icon = "🌫️"; }
      else if (weatherCode <= 63) { desc = "Rain"; icon = "🌧️"; }
      else if (weatherCode <= 73) { desc = "Snow"; icon = "❄️"; }
      else if (weatherCode <= 82) { desc = "Showers"; icon = "☔"; }
      else { desc = "Variable"; icon = "🌥️"; }

      // Update current temp and description
      document.getElementById("weatherTemp").innerText = Math.round(currentTemp);
      document.getElementById("weatherDesc").innerText = desc;

      // Show min/max nicely
      const minMaxSpan = document.getElementById("weatherMinMax");
      if (minMaxSpan) {
        minMaxSpan.innerHTML = `↑${Math.round(todayMax)}° ↓${Math.round(todayMin)}°`;
      }

      // Tooltip with full details
      const widget = document.getElementById("weatherWidget");
      widget.setAttribute("title", `Current: ${Math.round(currentTemp)}°C · Min: ${Math.round(todayMin)}°C · Max: ${Math.round(todayMax)}°C · ${desc}`);

      // Update icon
      const iconSpan = widget.querySelector("span:first-child");
      if (iconSpan) iconSpan.innerHTML = icon;

    } else {
      throw new Error("No weather or daily data");
    }
  } catch (err) {
    console.warn("Weather fetch failed:", err);
    document.getElementById("weatherTemp").innerText = "--";
    document.getElementById("weatherDesc").innerText = "unavailable";
    const minMaxSpan = document.getElementById("weatherMinMax");
    if (minMaxSpan) minMaxSpan.innerHTML = "";
    const widget = document.getElementById("weatherWidget");
    if (widget) widget.setAttribute("title", "Weather data offline");
  }
};

function getCurrentSiloTons(groupId, siloIndex) {

function addDelivery(groupId) {
  const dateStr = document.getElementById(`del_date_${groupId}`)?.value;
  const amountStr = document.getElementById(`del_amount_${groupId}`)?.value;
  const targetStr = document.getElementById(`del_target_${groupId}`)?.value;
  const overflowStr = document.getElementById(`del_overflow_${groupId}`)?.value;

  if (!dateStr) return alert("Select a delivery date.");
  const date = parseISO(dateStr);
  if (!date) return alert("Invalid date.");

  const amount = Number(amountStr);
  if (!Number.isFinite(amount) || amount <= 0) return alert("Enter a positive amount (tonnes).");

  const targetSilo = Number(targetStr);
  if (![1,2,3].includes(targetSilo)) return alert("Select a primary silo (1-3).");

  let overflowSilo = overflowStr === "" ? null : Number(overflowStr);
  if (overflowSilo !== null && ![1,2,3].includes(overflowSilo)) overflowSilo = null;
  // Get current tonnes in the target silo
const currentTons = getCurrentSiloTons(groupId, targetSilo - 1);
const remainingCapacity = 50 - currentTons;   // each silo max 50T

// If no overflow silo is specified, check capacity
if (!overflowSilo && amount > remainingCapacity) {
  alert(`⚠️ Delivery of ${amount.toFixed(2)} t exceeds remaining capacity of Silo ${targetSilo} (${remainingCapacity.toFixed(2)} t available).\nPlease reduce amount or specify an overflow silo.`);
  return;
}

  // Add to state
  if (!groupDeliveries[groupId]) groupDeliveries[groupId] = [];
  groupDeliveries[groupId].push({
    date: dateOnly(date),
    amountT: amount,
    targetSilo,
    overflowSilo
  });

  // Sort by date
  groupDeliveries[groupId].sort((a,b) => dateOnly(a.date) - dateOnly(b.date));

  saveState();
  refreshSiloUI(groupId);

  // Clear form
  document.getElementById(`del_date_${groupId}`).value = "";
  document.getElementById(`del_amount_${groupId}`).value = "";
  document.getElementById(`del_target_${groupId}`).value = "1";
  document.getElementById(`del_overflow_${groupId}`).value = "";
}

  if (!groupDeliveries[groupId]) return;
  groupDeliveries[groupId].splice(index, 1);

const _charts = new Map();

function destroyChart(id){
  const ch = _charts.get(id);
  if (ch) { ch.destroy(); _charts.delete(id); }
}

function isMeasurable(el){
  if (!el) return false;
  const r = el.getBoundingClientRect();
  return r.width > 10 && r.height > 10;
}

function upsertChart(id, config, retries = 10){
  const canvas = document.getElementById(id);
  if (!canvas) { destroyChart(id); return; }

  const parent = canvas.parentElement || canvas;
  if (!isMeasurable(parent)) {
    if (retries > 0) return setTimeout(()=>upsertChart(id, config, retries-1), 80);
    return;
  }

  let existing = _charts.get(id);
  if (existing && existing.canvas !== canvas) {
    existing.destroy();
    _charts.delete(id);
    existing = null;
  }

  if (existing) {
    existing.data = config.data;
    existing.options = config.options;
    existing.update();
    existing.resize();
    return;
  }

  const chart = new Chart(canvas.getContext("2d"), config);
  _charts.set(id, chart);
  setTimeout(()=>{ try{ chart.resize(); }catch{} }, 120);
}

/* =========================================================
   Excel Import/Export
========================================================= */
function triggerExcelImport(){
  const input = document.getElementById("excelFile");
  if (!input) return alert("Import error: #excelFile not found in DOM.");
  input.value = "";
  input.click();
}

(function setupExcelImport(){
  const input = document.getElementById("excelFile");
  if (!input) return;

  input.onchange = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;

    if (typeof XLSX === "undefined") return alert("Import failed: XLSX library not loaded.");

    try {
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data, { type: "array" });

      const sheetName =
        wb.SheetNames.find(n => String(n).toLowerCase() === "sheds") || wb.SheetNames[0];

      const ws = wb.Sheets[sheetName];
      if (!ws) throw new Error("No worksheet found.");

      const rows = XLSX.utils.sheet_to_json(ws, { defval: "", raw: false, dateNF: "dd/mm/yyyy" });
      if (!rows.length) throw new Error("No data rows found.");

      const getVal = (row, keys) => {
        for (const k of keys) {
          if (row[k] !== undefined && row[k] !== null && String(row[k]).trim() !== "") return row[k];
        }
        return "";
      };
      const parseBool = (v) => {
        const s = String(v ?? "").trim().toLowerCase();
        return s === "true" || s === "yes" || s === "1" || s === "y";
      };

      // Helper to detect if a cleanout value is truly invalid (empty, zero, Excel zero-date)
      function isInvalidCleanout(rawValue) {
        if (!rawValue) return true;
        if (typeof rawValue === 'number' && rawValue === 0) return true;
        const str = String(rawValue).trim();
        if (str === '' || str === '0/1/1900' || str === '1/1/1900' || str === '1900-01-01') return true;
        // Also treat parsed null as invalid
        const parsed = parseExcelDateDMY(rawValue);
        if (!parsed) return true;
        return false;
      }

      let importedBatch = "";
      let updated = 0;
      let skipped = 0;

      for (const r of rows) {
        const shedIdRaw = getVal(r, ["Shed", "shed", "ShedId", "Shed ID", "ShedID", "Shed#", "Shed No", "ShedNo"]);
        const shedId = Number(shedIdRaw);
        if (!Number.isFinite(shedId) || shedId < 1 || shedId > 8) { skipped++; continue; }
        const idx = shedId - 1;

        const bn = String(getVal(r, ["BatchNumber", "Batch Number", "Batch", "Batch#"]) || "").trim();
        if (!importedBatch && bn) importedBatch = bn;

        const placementRaw = getVal(r, ["PlacementDate", "Placement Date", "Placement", "Placement_Dt"]);
        const cleanoutRaw  = getVal(r, ["CleanoutDate", "Cleanout Date", "Cleanout", "Cleanout_Dt"]);
        const popRaw       = getVal(r, ["InitialPopulation", "Initial Population", "Population", "InitPop", "InitialPop"]);
        const mortRaw      = getVal(r, ["Mortality", "MortalityCount", "Mortality Count", "TotalMortality"]);

        const placement = parseExcelDateDMY(placementRaw);
        const pop       = Number(popRaw);
        const mort      = Number(mortRaw);

        if (placement) sheds[idx].placementDate = placement;
        if (Number.isFinite(pop) && pop > 0) sheds[idx].initialPopulation = Math.floor(pop);
        
        // ----- Cleanout date logic: invalid -> placement + 52 days -----
        let cleanoutDate = null;
        if (placement && isInvalidCleanout(cleanoutRaw)) {
          // invalid or empty cleanout: use placement + 52 days
          cleanoutDate = addDays(placement, 52);
        } else {
          // try to parse normally
          cleanoutDate = parseExcelDateDMY(cleanoutRaw);
        }
        sheds[idx].cleanoutDate = cleanoutDate;
        
        if (Number.isFinite(mort)) sheds[idx].mortality = Math.floor(mort);

        // reset reverse snapshot
        sheds[idx].prevMortalityBeforeFinal = null;
        sheds[idx].prevCleanoutBeforeFinal = null;

        // pickups 1..5
        const pickups = [];
        for (let p=1; p<=5; p++){
          const dRaw = getVal(r, [`Pickup${p}Date`, `Pickup ${p} Date`, `P${p}Date`, `P${p} Date`]);
          const bRaw = getVal(r, [`Pickup${p}Birds`, `Pickup ${p} Birds`, `P${p}Birds`, `P${p} Birds`]);
          const fRaw = getVal(r, [`Pickup${p}Final`, `Pickup ${p} Final`, `P${p}Final`]);
          const vRaw = getVal(r, [`Pickup${p}Variance`, `Pickup ${p} Variance`, `P${p}Variance`]);

          const d = parseExcelDateDMY(dRaw) || (typeof dRaw === "string" && /^\d{4}-\d{2}-\d{2}$/.test(dRaw) ? parseISO(dRaw) : null);
          const b = Number(bRaw);
          const isFinal = parseBool(fRaw);
          const variance = Number(vRaw);

          if (d && Number.isFinite(b) && b > 0) {
            pickups.push({
              date: d,
              birds: Math.floor(b),
              isFinal: !!isFinal,
              variance: Number.isFinite(variance) ? variance : null
            });
          }
        }

        // Helper function to compute variance (already defined, but kept for clarity)
        function computeVarianceForPickup(shed, pickupDate, pickupBirds, allPickups) {
          const prevTotal = allPickups
            .filter(p => dateOnly(p.date) < dateOnly(pickupDate))
            .reduce((sum, p) => sum + p.birds, 0);
          const expectedLive = shed.initialPopulation - prevTotal - shed.mortality;
          return pickupBirds - expectedLive;
        }

        // Auto‑final + auto‑variance for 5th pickup
        if (pickups.length === 5 && !pickups.some(p => p.isFinal)) {
          pickups[4].isFinal = true;
          if (pickups[4].variance == null || pickups[4].variance === 0) {
            pickups[4].variance = computeVarianceForPickup(sheds[idx], pickups[4].date, pickups[4].birds, pickups);
          }
        }

        pickups.sort((a,b)=>dateOnly(a.date)-dateOnly(b.date));

        // Ensure only one final pickup
        let finalSeen = false;
        for (const p of pickups){
          if (p.isFinal && !finalSeen) finalSeen = true;
          else if (p.isFinal && finalSeen) p.isFinal = false;
        }
        sheds[idx].pickups = pickups.slice(0,5);

        // Final pickup handling: set cleanout and recalc mortality
        const fp = sheds[idx].pickups.find(x => x.isFinal);
        if (fp) {
          sheds[idx].cleanoutDate = dateOnly(fp.date);
          const totalPicked = sheds[idx].pickups.reduce((sum, p) => sum + p.birds, 0);
          sheds[idx].mortality = Math.max(0, sheds[idx].initialPopulation - totalPicked);
          sheds[idx].prevMortalityBeforeFinal = null;
          sheds[idx].prevCleanoutBeforeFinal = null;
        }

        updated++;
      }

      if (importedBatch) batchNumber = importedBatch;

      saveState();
      render();

      alert(`Import complete.\nSheet used: ${sheetName}\nRows updated: ${updated}\nSkipped: ${skipped}`);
    } catch (err) {
      console.error(err);
      alert("Import failed:\n" + (err?.message || err));
    }
    
  };
})();
</script>
